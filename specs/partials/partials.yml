      <html>
      <head>
        <title>{{ shop.name }}</title>
        <meta charset="utf-8">
      </head>
      <body>
        <header class="site-header">
          <div class="logo">{{ shop.name }}</div>
          {% render 'main_nav' %}
          {% render 'cart_icon' %}
        </header>
    main_nav: |
      <nav class="main-nav">
        <a href="/">Home</a>
        <a href="/collections">Shop</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </nav>
    cart_icon: |
      <div class="cart-icon">
        <a href="/cart">Cart</a>
      </div>
    breadcrumb_nav: |
      <nav class="breadcrumbs" aria-label="Breadcrumb">
        <ol>
        {% for crumb in crumbs %}
          <li>
            {% if crumb.url %}
              <a href="{{ crumb.url }}">{{ crumb.title }}</a>
            {% else %}
              <span aria-current="page">{{ crumb.title }}</span>
            {% endif %}
          </li>
        {% endfor %}
        </ol>
      </nav>
    product_gallery: |
      <div class="product-gallery">
        {% for image in images %}
          <div class="gallery-image{% if forloop.first %} active{% endif %}">
            <img src="{{ image.src }}" alt="{{ image.alt }}" loading="{% if forloop.first %}eager{% else %}lazy{% endif %}">
          </div>
        {% endfor %}
        <div class="gallery-thumbs">
          {% for image in images %}
            <button class="thumb{% if forloop.first %} active{% endif %}" data-index="{{ forloop.index0 }}">
              <img src="{{ image.src }}" alt="{{ image.alt }}">
            </button>
          {% endfor %}
        </div>
      </div>
    product_info: |
      <div class="product-info">
        <p class="vendor">{{ product.vendor }}</p>
        <h1 class="title">{{ product.title }}</h1>
        <div class="price">
          {% if product.compare_at_price > product.price %}
            <span class="compare-price">${{ product.compare_at_price }}</span>
          {% endif %}
          <span class="current-price">${{ product.price }}</span>
          {% if product.compare_at_price > product.price %}
            {% assign savings = product.compare_at_price | minus: product.price %}
            <span class="savings">Save ${{ savings }}</span>
          {% endif %}
        </div>
        <div class="description">{{ product.description }}</div>
        <div class="tags">
          {% for tag in product.tags %}
            <span class="tag">{{ tag }}</span>
          {% endfor %}
        </div>
      </div>
    variant_selector: |
      <div class="variant-selector">
        <label for="variant-select">Select variant:</label>
        <select id="variant-select" name="variant">
          {% for variant in variants %}
            <option value="{{ variant.id }}" {% unless variant.available %}disabled{% endunless %}>
              {{ variant.title }} - ${{ variant.price }}{% unless variant.available %} (Sold out){% endunless %}
            </option>
          {% endfor %}
        </select>
      </div>
    add_to_cart_form: |
      <form class="add-to-cart" action="/cart/add" method="post">
        <input type="hidden" name="id" value="{{ product.id }}">
        <div class="quantity">
          <label for="quantity">Quantity:</label>
          <input type="number" id="quantity" name="quantity" value="1" min="1">
        </div>
        {% if product.available %}
          <button type="submit" class="btn-add">Add to Cart</button>
        {% else %}
          <button type="button" class="btn-sold-out" disabled>Sold Out</button>
        {% endif %}
      </form>
    product_tabs: |
      <div class="product-tabs">
        <div class="tab-panel" id="features">
          <h3>Features</h3>
          <ul>
            {% for feature in product.features %}
              <li>{{ feature }}</li>
            {% endfor %}
          </ul>
        </div>
        <div class="tab-panel" id="care">
          <h3>Care Instructions</h3>
          <ul>
            {% for instruction in product.care %}
              <li>{{ instruction }}</li>
            {% endfor %}
          </ul>
        </div>
      </div>
    related_grid: |
      <section class="related-products">
        <h2>{{ title }}</h2>
        <div class="product-grid">
          {% for product in products %}
            {% render 'product_card', product: product %}
          {% endfor %}
        </div>
      </section>
    product_card: |
      <div class="product-card">
        <a href="{{ product.url }}">
          <img src="{{ product.image }}" alt="{{ product.title }}">
          <h3>{{ product.title }}</h3>
          <p class="price">${{ product.price }}</p>
        </a>
      </div>
    recently_viewed: |
      <section class="recently-viewed">
        <h2>Recently Viewed</h2>
        <div class="product-row">
          {% for product in products %}
            {% render 'product_card', product: product %}
          {% endfor %}
        </div>
      </section>
    theme_footer: |
      <footer class="site-footer">
        <div class="footer-links">
          {% for link in links %}
            <a href="{{ link.url }}">{{ link.title }}</a>
          {% endfor %}
        </div>
        <div class="footer-info">
          <p>&copy; {{ shop.name }}</p>
          <p>Contact: {{ shop.email }}</p>
        </div>
      </footer>
      </body>
      </html>

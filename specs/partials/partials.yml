        {% render 'cart_totals', cart: cart %}
        {% render 'cart_actions' %}
        {% render 'shipping_calculator', rates: shipping_rates %}
      {% else %}
        {% render 'empty_cart' %}
      {% endif %}
      {% render 'cart_recommendations', products: recommendations %}
    </main>

# =============================================================================
# E-commerce Product Page
# =============================================================================

- name: bench_ecommerce_product_page
  template: |
    {% render 'page_header', page_title: product.name %}
    {% render 'breadcrumbs', items: breadcrumbs %}
    {% render 'product_detail', product: product %}
    {% render 'product_reviews', reviews: reviews %}
    {% render 'related_products', products: related %}
    {% render 'page_footer' %}
  environment:
    product:
      name: Premium Widget
      price: 99.99
      description: The finest widget money can buy
      sku: WDG-001
      in_stock: true
      features:
      - Durable
      - Lightweight
      - Eco-friendly
    breadcrumbs:
    - label: Home
      url: "/"
    - label: Widgets
      url: "/widgets"
    - label: Premium Widget
      url:
    reviews:
    - author: Alice
      rating: 5
      text: Amazing!
    - author: Bob
      rating: 4
      text: Very good
    - author: Carol
      rating: 5
      text: Love it
    related:
    - name: Basic Widget
      price: 29.99
    - name: Super Widget
      price: 149.99
    - name: Widget Pro
      price: 199.99
  filesystem:
    page_header: |
      <header>
        <h1>{{ page_title }}</h1>
      </header>
    breadcrumbs: |
      <nav class="breadcrumbs">
        {% for item in items %}
          {% if item.url %}
            <a href="{{ item.url }}">{{ item.label }}</a>
          {% else %}
            <span>{{ item.label }}</span>
          {% endif %}
          {% unless forloop.last %} &gt; {% endunless %}
        {% endfor %}
      </nav>
    product_detail: |
      <article class="product">
        <h2>{{ product.name }}</h2>
        <p class="price">${{ product.price }}</p>
        <p class="description">{{ product.description }}</p>
        <p class="sku">SKU: {{ product.sku }}</p>
        {% if product.in_stock %}
          <p class="stock in-stock">In Stock</p>
        {% else %}
          <p class="stock out-of-stock">Out of Stock</p>
        {% endif %}
        <ul class="features">
          {% for feature in product.features %}
            <li>{{ feature }}</li>
          {% endfor %}
        </ul>
      </article>
    product_reviews: |
      <section class="reviews">
        <h3>Customer Reviews</h3>
        {% for review in reviews %}
          {% render 'review_card', review: review %}
        {% endfor %}
      </section>
    review_card: |
      <div class="review">
        <strong>{{ review.author }}</strong>
        <span class="rating">{{ review.rating }}/5</span>
        <p>{{ review.text }}</p>
      </div>
    related_products: |
      <section class="related">
        <h3>Related Products</h3>
        <ul>
          {% for product in products %}
            <li>{{ product.name }} - ${{ product.price }}</li>
          {% endfor %}
        </ul>
      </section>
    page_footer: |
      <footer>
        <p>Thank you for shopping with us!</p>
      </footer>
  expected: "<header>\n  <h1>Premium Widget</h1>\n</header>\n\n<nav class=\"breadcrumbs\">\n  \n    \n      <a href=\"/\">Home</a>\n    \n     &gt; \n  \n    \n      <a href=\"/widgets\">Widgets</a>\n    \n     &gt; \n  \n    \n      <span>Premium Widget</span>\n    \n    \n  \n</nav>\n\n<article class=\"product\">\n  <h2>Premium Widget</h2>\n  <p class=\"price\">$99.99</p>\n  <p class=\"description\">The finest widget money can buy</p>\n  <p class=\"sku\">SKU: WDG-001</p>\n  \n    <p class=\"stock in-stock\">In Stock</p>\n  \n  <ul class=\"features\">\n    \n      <li>Durable</li>\n    \n      <li>Lightweight</li>\n    \n      <li>Eco-friendly</li>\n    \n  </ul>\n</article>\n\n<section class=\"reviews\">\n  <h3>Customer Reviews</h3>\n  \n    <div class=\"review\">\n  <strong>Alice</strong>\n  <span class=\"rating\">5/5</span>\n  <p>Amazing!</p>\n</div>\n\n  \n    <div class=\"review\">\n  <strong>Bob</strong>\n  <span class=\"rating\">4/5</span>\n  <p>Very good</p>\n</div>\n\n  \n    <div class=\"review\">\n  <strong>Carol</strong>\n  <span class=\"rating\">5/5</span>\n  <p>Love it</p>\n</div>\n\n  \n</section>\n\n<section class=\"related\">\n  <h3>Related Products</h3>\n  <ul>\n    \n      <li>Basic Widget - $29.99</li>\n    \n      <li>Super Widget - $149.99</li>\n    \n      <li>Widget Pro - $199.99</li>\n    \n  </ul>\n</section>\n\n<footer>\n  <p>Thank you for shopping with us!</p>\n</footer>\n\n"
  complexity: 1000

# =============================================================================
# Theme Product Page (Shopify-inspired full page render)
# =============================================================================

- name: bench_theme_product_page
  template: |
    {% render 'theme_header', shop: shop %}
    {% render 'breadcrumb_nav', crumbs: breadcrumbs %}
    <main class="product-page">
      {% render 'product_gallery', images: product.images %}
      {% render 'product_info', product: product, variants: variants %}
      {% render 'variant_selector', variants: variants %}
      {% render 'add_to_cart_form', product: product %}
      {% render 'product_tabs', product: product %}
      {% render 'related_grid', products: related_products, title: 'You may also like' %}
      {% render 'recently_viewed', products: recent_products %}
    </main>
    {% render 'theme_footer', shop: shop, links: footer_links %}
  environment:
    shop:
      name: Acme Store
      currency: USD
      email: support@acme.test
    product:
      id: 12345
      title: Classic Leather Jacket
      vendor: Acme Apparel
      type: Outerwear
      price: 299.99
      compare_at_price: 399.99
      description: Premium quality genuine leather jacket with satin lining. Features
        two front pockets and an interior pocket.
      sku: LJ-BLK-M
      available: true
      tags:
      - leather
      - jacket
      - outerwear
      - premium
      images:
      - src: "/images/jacket-front.jpg"
        alt: Front view
      - src: "/images/jacket-back.jpg"
        alt: Back view
      - src: "/images/jacket-detail.jpg"
        alt: Detail view
      - src: "/images/jacket-pocket.jpg"
        alt: Pocket detail
      options:
      - name: Size
        values:
        - S
        - M
        - L
        - XL
      - name: Color
        values:
        - Black
        - Brown
        - Navy
      features:
      - 100% genuine leather
      - Satin lining
      - YKK zippers
      - Two exterior pockets
      - One interior pocket
      care:
      - Dry clean only
      - Store on padded hanger
      - Keep away from heat
    variants:
    - id: 1
      title: S / Black
      price: 299.99
      available: true
      sku: LJ-BLK-S
    - id: 2
      title: M / Black
      price: 299.99
      available: true
      sku: LJ-BLK-M
    - id: 3
      title: L / Black

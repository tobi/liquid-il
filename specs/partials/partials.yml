tle\">Suede Jacket</h3>\n      <div class=\"price\">\n        \n          <span class=\"compare-price\">$329.99</span>\n        \n        <span class=\"current-price\">$279.99</span>\n      </div>\n      <div class=\"tags\">\n        \n          <span class=\"tag\">suede</span>\n        \n          <span class=\"tag\">premium</span>\n        \n      </div>\n    </div>\n  </a>\n  \n    <button class=\"btn-quick-add\" data-id=\"8\">Quick Add</button>\n  \n</article>\n\n  \n    <article class=\"product-card\">\n  <a href=\"/products/rain-jacket\" class=\"product-link\">\n    <div class=\"product-image\">\n      <img src=\"/images/rain.jpg\" alt=\"Rain Jacket\" loading=\"lazy\">\n      \n      \n    </div>\n    <div class=\"product-details\">\n      <p class=\"vendor\">Acme Apparel</p>\n      <h3 class=\"title\">Rain Jacket</h3>\n      <div class=\"price\">\n        \n        <span class=\"current-price\">$149.99</span>\n      </div>\n      <div class=\"tags\">\n        \n          <span class=\"tag\">waterproof</span>\n        \n          <span class=\"tag\">light</span>\n        \n      </div>\n    </div>\n  </a>\n  \n    <button class=\"btn-quick-add\" data-id=\"9\">Quick Add</button>\n  \n</article>\n\n  \n    <article class=\"product-card\">\n  <a href=\"/products/down-jacket\" class=\"product-link\">\n    <div class=\"product-image\">\n      <img src=\"/images/down.jpg\" alt=\"Down Jacket\" loading=\"lazy\">\n      \n      \n    </div>\n    <div class=\"product-details\">\n      <p class=\"vendor\">Acme Apparel</p>\n      <h3 class=\"title\">Down Jacket</h3>\n      <div class=\"price\">\n        \n        <span class=\"current-price\">$279.99</span>\n      </div>\n      <div class=\"tags\">\n        \n          <span class=\"tag\">winter</span>\n        \n          <span class=\"tag\">warm</span>\n        \n      </div>\n    </div>\n  </a>\n  \n    <button class=\"btn-quick-add\" data-id=\"10\">Quick Add</button>\n  \n</article>\n\n  \n    <article class=\"product-card\">\n  <a href=\"/products/fleece\" class=\"product-link\">\n    <div class=\"product-image\">\n      <img src=\"/images/fleece.jpg\" alt=\"Fleece Jacket\" loading=\"lazy\">\n      \n      \n    </div>\n    <div class=\"product-details\">\n      <p class=\"vendor\">Acme Apparel</p>\n      <h3 class=\"title\">Fleece Jacket</h3>\n      <div class=\"price\">\n        \n        <span class=\"current-price\">$89.99</span>\n      </div>\n      <div class=\"tags\">\n        \n          <span class=\"tag\">fleece</span>\n        \n          <span class=\"tag\">casual</span>\n        \n      </div>\n    </div>\n  </a>\n  \n    <button class=\"btn-quick-add\" data-id=\"11\">Quick Add</button>\n  \n</article>\n\n  \n    <article class=\"product-card\">\n  <a href=\"/products/blazer\" class=\"product-link\">\n    <div class=\"product-image\">\n      <img src=\"/images/blazer.jpg\" alt=\"Blazer\" loading=\"lazy\">\n      \n        <span class=\"badge sale\">Sale</span>\n      \n      \n    </div>\n    <div class=\"product-details\">\n      <p class=\"vendor\">Premium Line</p>\n      <h3 class=\"title\">Blazer</h3>\n      <div class=\"price\">\n        \n          <span class=\"compare-price\">$249.99</span>\n        \n        <span class=\"current-price\">$199.99</span>\n      </div>\n      <div class=\"tags\">\n        \n          <span class=\"tag\">formal</span>\n        \n          <span class=\"tag\">business</span>\n        \n      </div>\n    </div>\n  </a>\n  \n    <button class=\"btn-quick-add\" data-id=\"12\">Quick Add</button>\n  \n</article>\n\n  \n</div>\n\n    <nav class=\"pagination\" aria-label=\"Pagination\">\n  \n  <ul class=\"page-numbers\">\n    \n      <li>\n        \n          <span class=\"current\" aria-current=\"page\">1</span>\n        \n      </li>\n    \n      <li>\n        \n          <a href=\"?page=2\">2</a>\n        \n      </li>\n    \n      <li>\n        \n          <a href=\"?page=3\">3</a>\n        \n      </li>\n    \n      <li>\n       
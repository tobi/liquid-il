# Curated Liquid behavior specs distilled from differential fuzzing of
# compiled-Liquid implementations against reference liquid
# (fuzz/ in github.com/tobi/liquid-il). Each spec captures a GENERIC
# behavior rule (editorially triaged from ~400 raw findings; see
# fuzz/triage/), and every expected: value was re-validated against the
# reference gem under liquid-spec harness conditions (line_numbers: true)
# at export time. Intended for donation to Shopify/liquid-spec.
#
# This file is EDITORIALLY CURATED — do not regenerate mechanically.
# Raw findings export for triage: rake fuzz:export -> fuzz/triage/raw_export.yml
---
- name: abs_non_numeric_string_is_zero
  template: '{{ "abc" | abs }}'
  expected: '0'
  complexity: 340
  hint: |
    The numeric filters abs, ceil, floor, and round coerce their input to a
    number before operating. A string that does not parse as a number coerces
    to 0 (not an error, and not the string itself). So abs("abc") = abs(0) = 0.
    The same rule gives {{ "abc" | ceil }}, {{ "abc" | floor }} and
    {{ "abc" | round }} all equal to 0.
- name: array_filter_reverse_wraps_scalar
  template: "{{ 5 | reverse }}"
  expected: '5'
  complexity: 335
  hint: |
    Array filters accept a non-array input by treating it as a single-element
    array. `reverse` of the one-item array [5] is [5], and an array renders by
    concatenating its elements with no separator, so the output is "5" -- not
    a bracketed "[5]". The same coercion applies to sort, uniq, and compact.
- name: array_filter_uniq_wraps_scalar
  template: '{{ 5 | uniq | join: "," }}'
  expected: '5'
  complexity: 330
  hint: |
    Filters in the array family (uniq, sort, compact, reverse, first, last,
    join) wrap a scalar input in a one-element array before operating. Here
    `uniq` sees [5]; `join` then produces "5". Do not error on a non-array
    input and do not render the array with brackets.
- name: assign_swallows_filter_error
  template: 'before{% assign v = "x" | truncate: nil %}after[{{ v }}]'
  expected: beforeafter[]
  complexity: 500
  hint: |
    A filter that raises during the expression of an {% assign %} does not
    surface an error into the page. The assignment is abandoned, the target
    variable is left undefined (renders as empty), and rendering continues.
    Here `truncate: nil` would raise "invalid integer" in an output tag, but
    inside {% assign %} it is swallowed. This differs from {{ ... }} and
    {% echo ... %}, which render the "Liquid error: ..." text.
- name: blank_body_suppresses_render_error_text_lax
  template: '{% if 5 > "x" %}{% endif %}'
  error_mode: :lax
  render_errors: true
  expected: ''
  complexity: 700
  hint: |
    In lax mode, a control-flow tag (if/unless/for/case) whose entire body is
    blank (whitespace-only text, comments, assigns, captures) suppresses the
    TEXT of any render error raised while evaluating it: the condition IS
    evaluated and the error is recorded (strict rendering still raises), but
    nothing is written to the output. The same error inside a non-blank body
    renders the "Liquid error (...)" text. Here `5 > "x"` raises a comparison
    error, but the blank if body keeps the output empty.
- name: bracket_access_on_number_returns_nil
  template: a{{ n["title"] }}b
  environment:
    "n": 5
  expected: ab
  complexity: 205
  hint: |
    Bracket access on a number (or any scalar that is not a string, array,
    hash, or drop) yields nil, which renders as empty -- it is not an error.
    A number does not respond to key lookup, so n["title"] is nil. Resolve
    property/key access on unsupported types to nil rather than raising.
- name: case_evaluates_all_when_clauses_without_break
  template: '{% case "a" %}{% when "a" %}1{% when "a" %}2{% else %}E{% endcase %}'
  expected: '12'
  complexity: 520
  hint: |
    case does NOT stop at the first matching when clause. Every when clause
    whose value matches the case subject renders its body, in order -- there is
    no break. Here both `when "a"` clauses match, so the output is "12". The
    else clause runs only when NO when clause matched at all (so it is skipped
    here). This surprises implementers who model case as a switch that stops on
    the first hit.
- name: case_repeats_body_for_each_matching_when_value
  template: '{% case "a" %}{% when "a", "a" %}M{% endcase %}'
  expected: MM
  complexity: 520
  hint: |
    Inside one when clause, each comma-separated value is matched
    independently, and the body is rendered once PER matching value. A when
    clause listing the same (or otherwise duplicate-matching) value twice
    renders its body twice: `{% when "a", "a" %}` against subject "a" outputs
    "MM". Contrast with a single match, which outputs the body once.
- name: ceil_non_numeric_string_is_zero
  template: '{{ "abc" | ceil }}'
  expected: '0'
  complexity: 340
  hint: |
    ceil coerces its input to a number first. A non-numeric string parses as 0,
    so ceil("abc") = 0. Numeric strings still work: {{ "5.1" | ceil }} is 6.
    abs, floor, and round follow the same coerce-to-number rule.
- name: comparison_of_number_and_string_is_an_error
  template: '{% if 5 > "x" %}hit{% endif %}'
  render_errors: true
  expected: 'Liquid error (line 1): comparison of Integer with String failed'
  complexity: 520
  hint: |
    The ordering operators <, >, <=, >= are only valid between operands that
    are mutually comparable. A number and a string are NOT: both respond to the
    operator, so the comparison is attempted and fails, producing
    "comparison of <NumberClass> with String failed". (Two numbers, or two
    strings, compare fine.) The if body here is non-blank, so the error text is
    rendered into the output.
- name: comparison_with_non_ordered_type_is_false
  template: "{% if 5 > true %}Y{% else %}N{% endif %}"
  expected: "N"
  complexity: 520
  hint: |
    Ordering operators (<, >, <=, >=) silently yield false -- with NO error --
    when either operand is a type that is not order-comparable at all, such as
    a boolean, nil, an array, or a hash. Only operand pairs where BOTH respond
    to the operator are actually compared. So `5 > true` is neither an error
    nor true: it is false, and the else branch runs. (Note the contrast with a
    number-vs-string comparison, which DOES raise, because a string is
    order-comparable.)
- name: cycle_renders_literal_booleans_and_advances
  template: "{% cycle true, false %}{% cycle true, false %}"
  expected: truefalse
  complexity: 190
  hint: |
    cycle outputs the string form of its current value and advances one position
    per invocation within a group. Boolean literals render as "true"/"false"
    (not empty). Unnamed cycles with identical literal argument lists share one
    counter, so the two invocations here yield "true" then "false".
- name: filter_missing_required_argument_raises
  template: '{{ "a-b-c" | split }}'
  render_errors: true
  expected: 'Liquid error (line 1): wrong number of arguments (given 1, expected 2)'
  complexity: 500
  hint: |
    A filter with a required positional argument raises a render error when
    invoked without one; it is not a silent no-op. `split` requires a pattern,
    so `| split` with no argument fails. The error is caught and rendered
    inline. (The "given 1" counts the piped input as the first argument.)
- name: for_over_string_yields_whole_string_once
  template: "{% for c in s %}[{{ c }}]{% endfor %}"
  environment:
    s: hi
  expected: "[hi]"
  complexity: 200
  hint: |
    A String is treated as a single-element collection: {% for c in s %} runs
    exactly one iteration binding the whole string ("[hi]"), never splitting it
    into characters. Non-enumerable scalars (numbers, booleans) are not
    single-element collections and iterate zero times.
- name: property_access_on_number_returns_nil
  template: a{{ n.title }}b
  environment:
    "n": 5
  expected: ab
  complexity: 200
  hint: |
    Dotted property access on a number yields nil (rendered as empty), not an
    error. Only strings, arrays, hashes, and drops expose members; every other
    type resolves any member access to nil. This keeps `{{ number.anything }}`
    safe instead of raising a type error.
- name: range_literal_nil_endpoint_coerces_to_zero
  template: "{% for i in (nil..2) %}{{ i }},{% endfor %}"
  expected: '0,1,2,'
  complexity: 200
  hint: |
    Range endpoints coerce to integers; nil (and any non-numeric value) becomes
    0. So (nil..2) is the range 0..2 and (nil..nil) is 0..0, a single-element
    range. A descending coerced range such as (2..nil) == (2..0) yields nothing.
- name: raw_output_not_trimmed_by_following_tag
  template: "{% raw %}a {% endraw %}{%- assign v = 1 -%}"
  expected: 'a '
  complexity: 300
  hint: |
    Whitespace control ({%- ... -%}) trims literal template text adjacent to the
    tag, but it does not reach into the rendered output of a preceding
    {% raw %} block. The trailing space produced by the raw block survives the
    {%- on the following tag, so the output is "a " (with the space).
- name: string_less_than_or_equal_ordering
  template: '{% if "apple" <= "apple" %}yes{% else %}no{% endif %}'
  expected: 'yes'
  complexity: 170
  hint: |
    The ordering operators <, >, <=, >= work between two strings using
    lexicographic comparison. Equal strings satisfy <= and >=, so
    "apple" <= "apple" is true. (Mixed number-vs-string ordering is a different
    case and raises a comparison error.)
- name: strings_compare_lexicographically
  template: '{% if "apple" < "banana" %}Y{% else %}N{% endif %}'
  expected: "Y"
  complexity: 160
  hint: |
    The ordering operators <, >, <=, >= work on two strings, comparing them
    lexicographically (byte/codepoint order), the same way Ruby's String#<=>
    does. `"apple" < "banana"` is true. String-vs-string comparison must not be
    rejected as a type error.
- name: truncate_nil_input_skips_length_coercion
  template: "{{ nil | truncate: nil }}"
  expected: ''
  complexity: 500
  hint: |
    truncate returns empty immediately when its input is nil, before it looks
    at the length argument. Because the argument is never coerced, a nil (or
    otherwise non-numeric) length does NOT raise "invalid integer" here. Only a
    non-nil input reaches length coercion: {{ "hi" | truncate: nil }} does
    raise.
- name: truncatewords_nil_input_skips_length_coercion
  template: "{{ nil | truncatewords: nil }}"
  expected: ''
  complexity: 500
  hint: |
    Like truncate, truncatewords short-circuits to empty on nil input before
    coercing its word-count argument, so a nil argument does not raise. A
    non-nil input with a non-numeric count still raises "invalid integer".
- name: unknown_filter_in_chain_passes_through
  template: '{{ "hello" | no_such_filter | upcase }}'
  expected: HELLO
  complexity: 205
  hint: |
    An unrecognized filter passes its input through unchanged, so it composes
    transparently in a chain: `no_such_filter` leaves "hello" untouched and the
    following `upcase` sees "hello". Unknown filters are no-ops, not chain
    breakers.
- name: unknown_filter_on_number_returns_input
  template: "{{ 42 | made_up_filter }}"
  expected: '42'
  complexity: 205
  hint: |
    The unknown-filter passthrough is type-agnostic: a non-string input is also
    returned unchanged. `made_up_filter` is not registered, so the number 42
    flows through and renders as "42".
- name: unknown_filter_returns_input_unchanged
  template: '{{ "hello" | no_such_filter }}'
  expected: hello
  complexity: 200
  hint: |
    By default Liquid does not error on an undefined filter: it returns the
    input unchanged. `no_such_filter` is not registered, so "hello" is emitted
    as-is. (Environments that opt into strict filters may instead raise; the
    default and the specs here use lenient passthrough.)
- name: whitespace_trim_does_not_reach_across_preceding_tag
  template: |-
    A
    {% comment %}{% endcomment %}{%- if nil -%}{% endif %}
  expected: 'A

    '
  complexity: 210
  hint: |
    A left-trim marker ({%-, {{-) strips whitespace only from the literal text
    node immediately before it in the source. When another tag sits between the
    text and the trim marker (here {% comment %}{% endcomment %}), there is no
    adjacent literal text to strip, so the earlier "A\n" is preserved. Trimming
    is a source-adjacency operation, not a reach-back through rendered output.
- name: whitespace_trim_preserves_raw_block_content
  template: "{% raw %}  {% endraw %}{{- nil -}}"
  expected: "  "
  complexity: 210
  hint: |
    The content emitted by a {% raw %} block is not trimmable literal template
    text. A following {{- (or {%-) trims only whitespace in the source text
    adjacent to it; the "  " lives inside the raw block, so it survives. Left/
    right trim markers never reach into a preceding raw (or comment) block's
    output.

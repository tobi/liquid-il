---
_metadata:
  hint: >
    Shopify theme tags are adapter-level extensions. LiquidIL::ShopifyMock should
    make them available without pulling in Shopify runtime classes: style wraps
    evaluated CSS, raw definition tags render nothing, form emits a simple form
    shell, and app-block/section hooks no-op safely.
  features:
    - shopify_tags
specs:
- name: shopify_mock_style_tag_wraps_evaluated_css
  template: "{% assign color = 'red' %}{% style %}.x { color: {{ color }}; }{% endstyle %}"
  expected: "<style data-shopify>.x { color: red; }</style>"
- name: shopify_mock_raw_definition_tags_discard_content
  template: "A{% schema %}{\"name\": \"ignored\"}{% endschema %}B{% javascript %}alert('{{ x }}'){% endjavascript %}C{% stylesheet %}.x { color: {{ x }} }{% endstylesheet %}D"
  environment:
    x: red
  expected: "ABCD"
- name: shopify_mock_form_tag_outputs_simple_form_shell
  template: "{% form 'contact' %}<input name=\"contact[email]\">{% endform %}"
  expected: "<form method=\"post\" action=\"/contact#contact_form\" accept-charset=\"UTF-8\"><input type=\"hidden\" name=\"form_type\" value=\"contact\" /><input type=\"hidden\" name=\"utf8\" value=\"✓\" /><input name=\"contact[email]\"></form>"
- name: shopify_mock_section_tag_renders_sections_file_with_mock_section_drop
  template: "A{% section 'header' %}B"
  filesystem:
    sections/header.liquid: "<h1>{{ section.id }}:{{ section.type }}</h1>"
  expected: "A<h1>header:header</h1>B"
- name: shopify_mock_dawn_json_settings_and_blocks_are_merged_into_section
  template: "{{ section.type }}:{% for block in section.blocks %}[{{ block.id }}={{ block.settings.color_scheme }}/{{ block.settings.text }}]{% endfor %}"
  environment:
    section:
      id: announcement-bar
      settings: {}
      blocks:
      - id: announcement-bar-0
        type: announcement
        settings: {}
        shopify_attributes: ""
  expected: "announcement-bar:[announcement-bar-0=background-1/Welcome to our store]"
- name: shopify_mock_content_for_header_includes_compiled_section_javascript
  template: "{{ content_for_header }}"
  environment:
    content_for_header: {}
    section:
      id: header
      settings: {}
      blocks: []
  expected: "<script id=\"sections-script\" data-sections=\"header,footer\" defer=\"defer\" src=\"//cdn.shopify.shopify-uh49.marcandre-cournoyer.eu.spin.dev/s/files/1/0000/0001/t/1/assets/sections.js\"></script>\n"
- name: shopify_mock_app_block_render_noop
  template: "A{% render block %}B"
  expected: "AB"

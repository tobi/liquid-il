---
_metadata:
  hint: Dynamic partial runtime repros (partial name from variable)
  doc: implementers/partials.md
  render_errors: true
specs:
- name: dynamic_include_switches_per_render
  template: "{% include tpl %}"
  filesystem:
    a: A
    b: B
  environment:
    tpl: a
  expected: "A"

- name: dynamic_include_for_iterates
  template: "{% include tpl for items %}"
  filesystem:
    item: "[{{ item }}]"
  environment:
    tpl: item
    items: [1, 2, 3]
  expected: "[1][2][3]"

- name: dynamic_include_nested
  template: "{% include tpl %}"
  filesystem:
    outer: "[OUT:{% include inner_tpl %}]"
    inner: "{{ value }}"
  environment:
    tpl: outer
    inner_tpl: inner
    value: ok
  expected: "[OUT:ok]"

- name: dynamic_include_missing_partial_inline_error
  template: "{% include tpl %}"
  filesystem: {}
  environment:
    tpl: missing
  expected: "Liquid error (line 1): Could not find partial 'missing'"

- name: dynamic_include_illegal_name_inline_error
  template: "{% include tpl %}"
  filesystem:
    x: X
  environment:
    tpl: 123
  expected: "Liquid error (line 1): Argument error in tag 'include' - Illegal template name"

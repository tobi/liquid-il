---
_metadata:
  hint: Parse error locations — structured line/position checking via error_location feature
  doc: implementers/error_locations.md
specs:
# ============================================================================
# Direct template parse errors — use structured line/position keys to check
# the SyntaxError's attributes directly, not just the message string.
# ============================================================================
- name: repro_parse_error_line_3_hash_character
  template: |
    line 1
    line 2
    {{ #{1+1} }}
  error_mode: :strict
  errors:
    parse_error:
      - "Unexpected character"
    line: 3
    position: 1
  complexity: 500
  hint: |
    {{ #{1+1} }} on line 3 must report line=3, position=1 via the
    structured error_location keys. The # character is not a valid
    Liquid expression start.

- name: repro_parse_error_line_4_bad_filter
  template: |
    line 1
    line 2
    line 3
    {{ foo | }}
  error_mode: :strict
  errors:
    parse_error:
      - "Expected filter name"
      - "Expected id"
    line: 4
  complexity: 500
  hint: |
    A dangling pipe on line 4 must report line=4. Position not checked
    since the exact column depends on expression offset tracking.

- name: repro_parse_error_line_3_unterminated_string
  template: |
    line 1
    line 2
    {{ 'oops }}
  error_mode: :strict
  errors:
    parse_error:
      - "Unexpected character"
      - "Unterminated string"
    line: 3
  complexity: 500
  hint: |
    An unterminated string on line 3 must report line=3.

- name: repro_parse_error_line_5_bad_dot
  template: |
    a
    b
    c
    d
    {{ foo. }}
  error_mode: :strict
  errors:
    parse_error:
      - "Expected property name"
    line: 5
  complexity: 510
  hint: |
    A dangling dot on line 5 must report line=5.

# ============================================================================
# Tag-level parse errors — for/assign/capture syntax errors. These raise
# in all error modes (not just strict).
# ============================================================================
- name: repro_parse_error_line_3_bad_for_syntax
  template: |
    line 1
    line 2
    {% for %}
    {% endfor %}
  errors:
    parse_error:
      - "Invalid for tag"
    line: 3
  complexity: 510
  hint: |
    A malformed for tag on line 3 must report line=3.

- name: repro_parse_error_line_3_bad_assign
  template: |
    line 1
    line 2
    {% assign %}
  errors:
    parse_error:
      - "Invalid assign"
    line: 3
  complexity: 510
  hint: |
    A malformed assign on line 3 must report line=3.

- name: repro_parse_error_line_4_capture_no_name
  template: |
    line 1
    line 2
    line 3
    {% capture %}
    {% endcapture %}
  errors:
    parse_error:
      - "Capture requires variable name"
    line: 4
  complexity: 510
  hint: |
    A capture tag without a variable name on line 4 must report line=4.

# ============================================================================
# Partial parse error locations — errors inside partials surface at render
# time. Using render_errors: true with errors: output: and line: N to check
# that "line N" appears in the inline error output.
# ============================================================================
- name: repro_partial_error_line_2_for_tag
  template: "{% render 'bad_partial' %}"
  error_mode: lax
  render_errors: true
  filesystem:
    bad_partial.liquid: |
      first line
      {% for %}
      {% endfor %}
  errors:
    output:
      - "bad_partial"
      - "Invalid for tag"
    line: 2
  complexity: 520
  hint: |
    A tag-level syntax error on line 2 of a rendered partial must surface
    at render time with the partial name "bad_partial" and "line 2" in
    the output. The structured line: 2 key checks "line 2" as a substring.

- name: repro_include_error_line_3_assign_tag
  template: "{% include 'bad_include' %}"
  error_mode: lax
  render_errors: true
  filesystem:
    bad_include.liquid: |
      line 1
      line 2
      {% assign %}
  errors:
    output:
      - "bad_include"
      - "Invalid assign"
    line: 3
  complexity: 520
  hint: |
    A tag-level syntax error on line 3 of an included partial must surface
    at render time with the partial name and "line 3" in the output.

- name: repro_nested_partial_error_inner_line_2
  template: "{% render 'outer_wrap' %}"
  error_mode: lax
  render_errors: true
  filesystem:
    outer_wrap.liquid: |
      outer start
      {% render 'inner_bad' %}
      outer end
    inner_bad.liquid: |
      inner line 1
      {% for %}
      {% endfor %}
  errors:
    output:
      - "inner_bad"
      - "Invalid for tag"
    line: 2
  complexity: 540
  hint: |
    A syntax error in a nested partial must surface with the innermost
    partial name "inner_bad" and "line 2" in the output.

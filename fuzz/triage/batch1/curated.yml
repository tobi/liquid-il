# Curated specs from differential-fuzzer batch1 (classes: for, unless, tablerow,
# raw, raw_tag, cycle, misc). Each entry was rendered against reference liquid
# (5.12.0, error_mode: :strict) and its `expected` is the exact reference output.
# Sorted by name. See summary.md for the finding->rule mapping and reference_bugs.md
# for divergences judged to be reference accidents rather than contracts.
---
- name: blank_conditional_body_skips_condition_evaluation
  template: "{% if s > 1 %}{% endif %}"
  environment:
    s: "a"
  expected: ""
  complexity: 600
  hint: |
    An if/unless whose entire body (every branch) is blank -- only whitespace,
    comments, or nested blank tags -- is a "blank" tag: the reference does not
    render it and therefore does not evaluate its condition. So a condition that
    would raise at render time (here comparing a String with a number, which
    otherwise errors with "comparison of String with 1 failed") produces no
    output and no error. Add any visible content to a branch (even {{ '' }}) and
    the condition IS evaluated. Do not evaluate conditions of fully-blank
    if/unless bodies.

- name: case_multiple_when_clauses_all_matches_render
  template: "{% case x %}{% when 'a' %}A{% when 'a' %}B{% endcase %}"
  environment:
    x: "a"
  expected: "AB"
  complexity: 520
  hint: |
    case does not stop at the first matching when. Every when clause whose value
    equals the case subject renders its body, in order. Two when clauses that
    both match produce both bodies ("AB"). Only when NO when matches does the
    else (if any) run.

- name: case_when_matches_render_body_once_per_matching_value
  template: "{% case x %}{% when 'a', 'a' %}hit{% endcase %}"
  environment:
    x: "a"
  expected: "hithit"
  complexity: 520
  hint: |
    A comma-separated when list is a set of independent match conditions, not a
    membership test. Each value that equals the case subject renders the body
    once, so a repeated value renders the body once per repetition
    ({% when 'a', 'a' %} against 'a' outputs "hithit"). An else is suppressed
    whenever at least one value matched.

- name: cycle_renders_literal_booleans_and_advances
  template: "{% cycle true, false %}{% cycle true, false %}"
  expected: "truefalse"
  complexity: 190
  hint: |
    cycle outputs the string form of its current value and advances one position
    per invocation within a group. Boolean literals render as "true"/"false"
    (not empty). Unnamed cycles with identical literal argument lists share one
    counter, so the two invocations here yield "true" then "false".

- name: for_over_string_yields_whole_string_once
  template: "{% for c in s %}[{{ c }}]{% endfor %}"
  environment:
    s: "hi"
  expected: "[hi]"
  complexity: 200
  hint: |
    A String is treated as a single-element collection: {% for c in s %} runs
    exactly one iteration binding the whole string ("[hi]"), never splitting it
    into characters. Non-enumerable scalars (numbers, booleans) are not
    single-element collections and iterate zero times.

- name: range_literal_nil_endpoint_coerces_to_zero
  template: "{% for i in (nil..2) %}{{ i }},{% endfor %}"
  expected: "0,1,2,"
  complexity: 200
  hint: |
    Range endpoints coerce to integers; nil (and any non-numeric value) becomes
    0. So (nil..2) is the range 0..2 and (nil..nil) is 0..0, a single-element
    range. A descending coerced range such as (2..nil) == (2..0) yields nothing.

- name: whitespace_trim_does_not_reach_across_preceding_tag
  template: "A\n{% comment %}{% endcomment %}{%- if nil -%}{% endif %}"
  expected: "A\n"
  complexity: 210
  hint: |
    A left-trim marker ({%-, {{-) strips whitespace only from the literal text
    node immediately before it in the source. When another tag sits between the
    text and the trim marker (here {% comment %}{% endcomment %}), there is no
    adjacent literal text to strip, so the earlier "A\n" is preserved. Trimming
    is a source-adjacency operation, not a reach-back through rendered output.

- name: whitespace_trim_preserves_raw_block_content
  template: "{% raw %}  {% endraw %}{{- nil -}}"
  expected: "  "
  complexity: 210
  hint: |
    The content emitted by a {% raw %} block is not trimmable literal template
    text. A following {{- (or {%-) trims only whitespace in the source text
    adjacent to it; the "  " lives inside the raw block, so it survives. Left/
    right trim markers never reach into a preceding raw (or comment) block's
    output.
